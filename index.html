<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>每日清单与备忘录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="app">
    <div id="list-panel" class="panel active">
      <div class="header">
        <div class="header-title-row">
          <h1 id="list-title">今天</h1>
        </div>
        <div class="icon-btns">
          <button class="icon-btn" id="open-search-btn" title="搜索">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
          <button class="icon-btn" id="open-calendar-btn" title="日历">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width: 0%"></div></div>
        <span class="progress-text" id="progress-text">0 / 0 已完成</span>
      </div>
      <div class="input-row">
        <div class="input-wrap">
          <div class="input-inner">
            <input type="text" id="todo-input" placeholder="添加新任务" />
            <button class="input-date-btn" id="input-date-btn" type="button" title="选择日期" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <span class="input-date-btn-text" id="input-date-btn-text"></span>
            </button>
          </div>
          <button class="btn-add" id="todo-add" type="button" aria-label="添加">
            <span class="btn-add-text">+</span>
          </button>
          <div class="input-date-picker" id="input-date-picker">
            <div class="input-date-picker-header">
              <button class="input-date-picker-nav" id="input-date-picker-prev">‹</button>
              <span id="input-date-picker-month"></span>
              <button class="input-date-picker-nav" id="input-date-picker-next">›</button>
            </div>
            <div class="input-date-picker-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
            <div class="input-date-picker-grid" id="input-date-picker-grid"></div>
          </div>
        </div>
      </div>
      <div class="list" id="todo-list"></div>
    </div>

    <div id="calendar-panel" class="panel">
      <div class="header"><h1>日历</h1></div>
      <div class="calendar-card">
        <div class="calendar-header">
          <button class="calendar-nav" id="prev-month">‹</button>
          <span id="calendar-month"></span>
          <button class="calendar-nav" id="next-month">›</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
      </div>
      <div class="daily-summary">
        <div class="daily-summary-header">
          <span class="daily-summary-date" id="summary-date"></span>
          <div class="progress-row" style="margin:0">
            <div class="progress-bar" style="width:60px"><div class="progress-fill" id="summary-progress-fill" style="width: 0%"></div></div>
            <span class="progress-text" id="summary-progress-text">0/0</span>
          </div>
        </div>
        <div id="summary-tasks"></div>
      </div>
    </div>

    <div id="memo-panel" class="panel">
      <div class="memo-header">
        <h2>备忘录</h2>
        <p class="memo-count" id="memo-count">0 条记录</p>
      </div>
      <button class="btn-new-memo" id="btn-new-memo">+ 新建备忘录</button>
      <div id="memo-list"></div>
    </div>

    <div id="ai-panel" class="panel">
      <div class="empty-state" style="padding-top:80px">AI 助手功能敬请期待</div>
    </div>

    <div id="me-panel" class="panel">
      <div class="memo-header">
        <h2>我的</h2>
      </div>
      <div class="empty-state" style="padding-top:48px">个人中心功能敬请期待</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="bottom-nav-bar">
      <button class="nav-item" data-tab="list">
        <span class="nav-icon-wrap">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
          </span>
        </span>
        <span class="nav-label">清单</span>
      </button>
      <button class="nav-item" data-tab="calendar">
        <span class="nav-icon-wrap">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </span>
        </span>
        <span class="nav-label">日历</span>
      </button>
      <div class="nav-center-spacer"></div>
      <button class="nav-item" data-tab="memo">
        <span class="nav-icon-wrap">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
          </span>
        </span>
        <span class="nav-label">备忘录</span>
      </button>
      <button class="nav-item" data-tab="me">
        <span class="nav-icon-wrap">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
        </span>
        <span class="nav-label">我的</span>
      </button>
    </div>
    <div class="nav-center-wrap">
      <button class="nav-center-btn" id="nav-ai-btn" data-tab="ai" title="AI 助手">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 8V4H8"/>
          <rect width="16" height="12" x="4" y="8" rx="2"/>
          <path d="M2 14h2"/>
          <path d="M20 14h2"/>
          <circle cx="9" cy="13" r="1"/>
          <circle cx="15" cy="13" r="1"/>
        </svg>
      </button>
      <span class="nav-center-label">AI 助手</span>
    </div>
  </nav>

  <div class="context-menu" id="context-menu">
    <button class="context-menu-item" id="context-add-memo">
      <span class="context-menu-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </span>
      <span>添加备忘</span>
    </button>
  </div>

  <div class="search-overlay" id="search-overlay">
    <div class="search-modal" id="search-modal">
      <div class="search-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="搜索或者输入一个指令......" autocomplete="off" />
        <span class="search-kbd">Ctrl K</span>
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <div class="modal-overlay" id="memo-modal">
    <div class="modal">
      <h3 id="memo-modal-title">添加备忘</h3>
      <input type="text" id="memo-modal-title-input" placeholder="备忘标题（来自清单时自动填充）" style="display:none; width:100%; padding:14px; border:1px solid #E5E5EA; border-radius:16px; font-size:1rem; margin-bottom:12px;" />
      <textarea id="memo-modal-input" placeholder="输入备忘内容..."></textarea>
      <div class="modal-actions">
        <button class="modal-cancel" id="memo-modal-cancel">取消</button>
        <button class="modal-confirm" id="memo-modal-confirm">保存</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="move-date-modal">
    <div class="modal move-date-modal-card">
      <h3 id="move-date-modal-title">更改日期</h3>
      <div class="move-date-picker">
        <div class="move-date-picker-header">
          <button class="move-date-picker-nav" id="move-date-picker-prev" type="button">‹</button>
          <span id="move-date-picker-month"></span>
          <button class="move-date-picker-nav" id="move-date-picker-next" type="button">›</button>
        </div>
        <div class="move-date-picker-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
        <div class="move-date-picker-grid" id="move-date-picker-grid"></div>
      </div>
      <div class="modal-actions">
        <button class="modal-cancel" id="move-date-modal-cancel" type="button">取消</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
